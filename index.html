<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Chess Game</h1>

    <!-- Score en Turn Info -->
    <div class="game-info">
        <div class="turn-display">
            <p>Beurt: <span id="turn">Wit</span></p>
        </div>
        <div class="score-display">
            <p>Wit: <span id="white-score">0</span></p>
            <p>Zwart: <span id="black-score">0</span></p>
        </div>
    </div>

    <div id="chessboard"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
